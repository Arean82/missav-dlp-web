<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 MissAV Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 <span data-i18n="app_title">MissAV Downloader</span></h1>
        <div class="header-controls">
            <select id="languageSelect" class="language-select">
                <option value="en">🇬🇧 English</option>
                <option value="ko">🇰🇷 한국어</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
            <select id="docsSelect" class="language-select">
                <option value="" disabled selected>📄 Docs</option>
                <option value="readme">README</option>
                <option value="security">SECURITY</option>
                <option value="license">LICENSE</option>
            </select>
            <button id="settingsBtn" class="btn-secondary">⚙️ <span data-i18n="settings">Settings</span></button>
        </div>
    </div>

    <!-- URL Input -->
    <div class="card">
        <div class="url-bar">
            <input type="text" id="urlInput" data-i18n-placeholder="url_placeholder" placeholder="Enter URL or JAV code (e.g., ABP-123)">
            <button id="getInfoBtn">🔍 <span data-i18n="get_info">Get Info</span></button>
            <button id="batchBtn" class="btn-secondary">📋 <span data-i18n="batch_add">Batch Add</span></button>
        </div>
        <div id="batchPanel" class="hidden">
            <textarea id="batchUrls" class="batch-input" data-i18n-placeholder="batch_placeholder" placeholder="Enter one URL or JAV code per line..."></textarea>
            <div class="button-group">
                <button id="addBatchBtn">➕ <span data-i18n="add_all">Add All to Queue</span></button>
                <button id="cancelBatchBtn" class="btn-secondary"><span data-i18n="cancel">Cancel</span></button>
            </div>
        </div>
    </div>

    <!-- Video Info -->
    <div class="card" id="infoCard" style="display:none">
        <h3><span data-i18n="video_info">Video Information</span></h3>

        <p id="videoTitle" style="font-weight:bold; word-break:break-all;">-</p>
        <p><span data-i18n="code">Code</span>: <span id="videoCode">-</span> | <span data-i18n="duration">Duration</span>: <span id="videoDuration">-</span></p>

        <div id="previewWarning" class="warning hidden"><span data-i18n="preview_warning">⚠️ Preview video (short version)</span></div>
        <div class="quality-row">
            <label><span data-i18n="quality">Quality</span>:</label>
            <select id="qualitySelect" class="quality-select"></select>
        </div>
        <div class="button-group">
            <button id="downloadBtn">⬇ <span data-i18n="download_now">Download Now</span></button>
            <button id="addQueueBtn" class="btn-secondary">➕ <span data-i18n="add_to_queue">Add to Queue</span></button>
        </div>
    </div>

    <!-- Queue Controls -->
    <div class="card">
        <div class="stats" id="stats"></div>
        <div class="button-group">
            <button id="cleanBtn" class="btn-secondary">🧹 <span data-i18n="clean_completed">Clean Completed</span></button>
            <button id="clearBtn" class="btn-danger">🗑 <span data-i18n="clear_waiting">Clear Waiting</span></button>
        </div>
    </div>

    <!-- Task List -->
    <div class="card">
        <h3><span data-i18n="download_queue">Download Queue</span></h3>
        <div id="taskList"></div>
    </div>

    <!-- File List -->
    <div class="card">
        <h3><span data-i18n="downloads">Downloads</span></h3>
        <input type="text" id="fileSearch" data-i18n-placeholder="search_files" placeholder="Search files..." class="search-input">
        <div id="fileList"></div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden" style="display: none;">
    <div class="modal-content">
        <h3><span data-i18n="settings_title">Settings</span></h3>
        <div class="setting-group">
            <label><span data-i18n="download_dir">Download Directory</span>:</label>
            <input type="text" id="settingsDownloadDir" class="setting-input">
        </div>
        <div class="setting-group">
            <label><span data-i18n="max_concurrent">Max Concurrent Downloads</span>:</label>
            <input type="number" id="settingsMaxConcurrent" class="setting-input" min="1" max="5" value="1">
        </div>
        <div class="setting-group">
            <label class="checkbox-label">
                <input type="checkbox" id="settingsSequentialMode"> <span data-i18n="sequential_mode">Sequential Mode (one at a time)</span>
            </label>
        </div>
        <div class="setting-group">
            <label><span data-i18n="delay_seconds">Delay between downloads (seconds)</span>:</label>
            <input type="number" id="settingsDelay" class="setting-input">
        </div>
        <div class="setting-group">
            <label><span data-i18n="default_quality">Default Quality</span>:</label>
            <select id="settingsQuality" class="setting-input">
                <option value="best"><span data-i18n="best">Best</span></option>
                <option value="2160p">2160p</option>
                <option value="1440p">1440p</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
                <option value="480p">480p</option>
                <option value="360p">360p</option>
                <option value="240p">240p</option>
            </select>
        </div>
        <div class="setting-group">
            <label><span data-i18n="mirror_domains">Mirror Domains (one per line)</span>:</label>
            <textarea id="settingsMirrors" rows="4" class="setting-textarea"></textarea>
        </div>
        <div class="button-group">
            <button id="saveSettingsBtn"><span data-i18n="save">Save</span></button>
            <button id="closeSettingsBtn" class="btn-secondary"><span data-i18n="cancel">Cancel</span></button>
        </div>
    </div>
</div>

<!-- Docs Modal -->
<div id="docsModal" class="modal hidden" style="display: none;">
    <div class="modal-content" style="max-width: 800px; max-height: 80vh; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 id="docsModalTitle" style="margin:0;">Document</h3>
            <button id="closeDocsBtn" class="btn-secondary" style="padding: 5px 10px;">✕</button>
        </div>
        <pre id="docsContent" style="white-space: pre-wrap; word-wrap: break-word; font-family: monospace; font-size: 14px; line-height: 1.6; text-align: left; background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow-y: auto; flex-grow: 1; margin:0;">Loading...</pre>
    </div>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
