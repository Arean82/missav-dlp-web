<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 MissAV Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='marked.min.js') }}"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 <span data-i18n="app_title">MissAV Downloader</span></h1>
        <div class="header-controls">
            <select id="languageSelect" class="language-select">
                <option value="en">🇬🇧 English</option>
                <option value="ko">🇰🇷 한국어</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="zh">🇨🇳 中文</option>
            </select>
            <select id="docsSelect" class="language-select">
                <option value="" disabled selected>📄 Docs</option>
                <option value="readme">README</option>
                <option value="security">SECURITY</option>
                <option value="license">LICENSE</option>
            </select>
            <button id="settingsBtn" class="btn-secondary">⚙️ <span data-i18n="settings">Settings</span></button>
        </div>
    </div>

    <!-- URL Input -->
    <div class="card">
        <div class="url-bar">
            <input type="text" id="urlInput" data-i18n-placeholder="url_placeholder" placeholder="Enter URL or JAV code (e.g., ABP-123)">
            <button id="startDownloadBtn">⬇️ <span data-i18n="download_now">Download</span></button>
            <button id="batchBtn" class="btn-secondary">📋 <span data-i18n="batch_add">Batch Add</span></button>
            <button id="customBtn" class="btn-secondary">🔗 <span data-i18n="custom">Custom</span></button>
        </div>
        <div id="batchPanel" class="hidden">
            <textarea id="batchUrls" class="batch-input" data-i18n-placeholder="batch_placeholder" placeholder="Enter one URL or JAV code per line..."></textarea>
            <div class="button-group">
                <button id="addBatchBtn">➕ <span data-i18n="add_all">Add All to Queue</span></button>
                <button id="cancelBatchBtn" class="btn-secondary"><span data-i18n="cancel">Cancel</span></button>
            </div>
        </div>
    </div>

    <!-- Crawler Modal -->
    <div id="crawlerModal" class="modal hidden" style="display: none;">
        <div class="modal-content" style="max-width: 900px; max-height: 90vh; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="crawlerModalTitle" style="margin:0;" data-i18n="custom_list">Custom List</h3>
                <button id="closeCrawlerBtn" class="btn-secondary" style="padding: 5px 10px;">✕</button>
            </div>
            
            <div id="crawlerStatus" class="card" style="padding: 10px; margin-bottom: 10px; background: #252526; font-size: 14px;">
                <span data-i18n="fetching">Fetching...</span>
            </div>

            <div style="flex-grow: 1; overflow-y: auto; border: 1px solid #333; border-radius: 5px;">
                <table class="crawler-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #0f3460;">
                            <th style="width: 40px; text-align: center;"><input type="checkbox" id="crawlerSelectAll"></th>
                            <th style="width: 120px;" data-i18n="code">Code</th>
                            <th data-i18n="title">Title</th>
                            <th style="width: 80px;" data-i18n="link">Link</th>
                        </tr>
                    </thead>
                    <tbody id="crawlerTableBody">
                        <tr><td colspan="4" style="text-align:center; padding:20px;" data-i18n="no_videos">No videos found</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="button-group" style="margin-top: 15px;">
                <button id="crawlerSelectAllBtn" class="btn-secondary">✅ <span data-i18n="select_all">Select All</span></button>
                <button id="crawlerSelectNoneBtn" class="btn-secondary" data-i18n="select_none">Select None</button>
                <button id="crawlerDownloadBtn" data-i18n="download_selected">⬇️ Download Selected</button>
            </div>
        </div>
    </div>

    <!-- Queue Controls -->
    <div class="card">
        <div class="stats" id="stats"></div>
        <div class="button-group">
            <button id="cleanBtn" class="btn-secondary">🧹 <span data-i18n="clean_completed">Clean Completed</span></button>
            <button id="cleanHistoryBtn" class="btn-danger">🗑️ <span data-i18n="clean_history">Clean History</span></button>
            <button id="clearBtn" class="btn-danger">🗑 <span data-i18n="clear_waiting">Clear Waiting</span></button>
        </div>
    </div>

    <!-- Task List -->
    <div class="card">
        <h3><span data-i18n="download_queue">Download Queue</span></h3>
        <div id="taskList"></div>
    </div>

    <!-- File List -->
    <div class="card">
        <h3><span data-i18n="downloads">Downloads</span></h3>
        <input type="text" id="fileSearch" data-i18n-placeholder="search_files" placeholder="Search files..." class="search-input">
        <div id="fileList"></div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden" style="display: none;">
    <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
        <h3><span data-i18n="settings_title">Settings</span></h3>
        <div class="setting-group">
            <label><span data-i18n="download_dir">Download Directory</span>:</label>
            <input type="text" id="settingsDownloadDir" class="setting-input">
        </div>
        <div class="setting-group">
            <label><span data-i18n="ffmpeg_path">FFmpeg Bin Directory</span>:</label>
            <input type="text" id="settingsFfmpegPath" class="setting-input" placeholder="e.g., C:\ffmpeg\bin">
            <small style="opacity:0.7;">Must contain ffmpeg, ffprobe, and ffplay</small>
        </div>
        <div class="setting-group">
            <label><span data-i18n="max_concurrent">Max Concurrent Downloads</span>:</label>
            <input type="number" id="settingsMaxConcurrent" class="setting-input" min="1" max="5" value="1">
        </div>
        <div class="setting-group">
            <label class="checkbox-label">
                <input type="checkbox" id="settingsSequentialMode"> <span data-i18n="sequential_mode">Sequential Mode (one at a time)</span>
            </label>
        </div>
        <div class="setting-group">
            <label><span data-i18n="delay_seconds">Delay between downloads (seconds)</span>:</label>
            <input type="number" id="settingsDelay" class="setting-input">
        </div>
        <div class="setting-group">
            <label><span data-i18n="default_quality">Default Quality</span>:</label>
            <select id="settingsQuality" class="setting-input">
                <option value="best"><span data-i18n="best">Best</span></option>
                <option value="2160p">2160p</option>
                <option value="1440p">1440p</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
                <option value="480p">480p</option>
                <option value="360p">360p</option>
                <option value="240p">240p</option>
            </select>
        </div>
        <div class="setting-group">
            <label><span data-i18n="mirror_domains">Mirror Domains (one per line)</span>:</label>
            <textarea id="settingsMirrors" rows="4" class="setting-textarea"></textarea>
        </div>
        <div class="button-group">
            <button id="saveSettingsBtn"><span data-i18n="save">Save</span></button>
            <button id="closeSettingsBtn" class="btn-secondary"><span data-i18n="cancel">Cancel</span></button>
        </div>
    </div>
</div>

<!-- Docs Modal -->
<div id="docsModal" class="modal hidden" style="display: none;">
    <div class="modal-content" style="max-width: 800px; max-height: 80vh; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 id="docsModalTitle" style="margin:0;">Document</h3>
            <button id="closeDocsBtn" class="btn-secondary" style="padding: 5px 10px;">✕</button>
        </div>
        <pre id="docsContent" style="white-space: pre-wrap; word-wrap: break-word; font-family: monospace; font-size: 14px; line-height: 1.6; text-align: left; background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow-y: auto; flex-grow: 1; margin:0;">Loading...</pre>
    </div>
</div>

<!-- Filter Selection Modal -->
<div id="filterModal" class="modal hidden" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0;" data-i18n="select_filter">Select Filter</h3>
            <button id="closeFilterBtn" class="btn-secondary" style="padding: 5px 10px;">✕</button>
        </div>
        
        <div id="filterList" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;">
            <!-- Filters will be injected here as radio buttons -->
        </div>
        
        <div class="button-group">
            <button id="cancelFilterBtn" class="btn-secondary" data-i18n="cancel">Cancel</button>
            <button id="confirmFilterBtn" data-i18n="next">Next</button>
        </div>
    </div>
</div>

<!-- Page Selection Modal -->
<div id="pageModal" class="modal hidden" style="display: none;">
    <div class="modal-content" style="max-width: 400px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0;" data-i18n="select_pages">Select Pages</h3>
            <button id="closePageBtn" class="btn-secondary" style="padding: 5px 10px;">✕</button>
        </div>
        
        <div class="setting-group">
            <label data-i18n="total_pages">Total Pages Available:</label>
            <div id="totalPagesDisplay" style="font-size: 24px; font-weight: bold; color: #00d9ff; margin: 10px 0;"></div>
        </div>
        
        <div class="setting-group">
            <label data-i18n="pages_to_scrape">Pages to Scrape:</label>
            <input type="number" id="pagesInput" class="setting-input" min="1" value="1" style="width: 100%;">
        </div>
        
        <div class="button-group">
            <button id="cancelPageBtn" class="btn-secondary" data-i18n="cancel">Cancel</button>
            <button id="confirmPageBtn" data-i18n="start_scrape">Start Scraping</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script src="{{ url_for('static', filename='crawler.js') }}"></script>
</body>
</html>
