services:
  missav-dlp-web:
    build: .
    container_name: missav-dlp-web
    ports:
      - '55000:5000'
    restart: unless-stopped
    environment:
      - FLASK_HOST=0.0.0.0
      - TZ=UTC  # Change to your timezone, e.g., Asia/Seoul
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./tasks.db:/app/tasks.db
      - ./.settings.json:/app/.settings.json